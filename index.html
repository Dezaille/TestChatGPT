<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petite calculatrice JS</title>
    <style>
      :root {
        font-family: Inter, Arial, sans-serif;
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
      }

      .calculator {
        width: min(320px, 90vw);
        padding: 1rem;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      #display {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 0.9rem;
        font-size: 1.4rem;
        text-align: right;
        box-sizing: border-box;
        margin-bottom: 0.9rem;
      }

      .keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.55rem;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 0.8rem;
        font-size: 1rem;
        cursor: pointer;
      }

      button.op {
        background: #f59e0b;
        color: #111827;
        font-weight: 700;
      }

      button.equal {
        background: #10b981;
        color: white;
        grid-column: span 2;
      }

      button.clear {
        background: #ef4444;
        color: white;
      }

      button:hover {
        filter: brightness(1.08);
      }
    </style>
  </head>
  <body>
    <main class="calculator" aria-label="Calculatrice simple">
      <input id="display" type="text" readonly value="0" aria-label="Écran" />
      <div class="keys">
        <button class="clear" data-action="clear">C</button>
        <button data-value="(">(</button>
        <button data-value=")">)</button>
        <button class="op" data-value="/">÷</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="op" data-value="*">×</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="op" data-value="-">−</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="op" data-value="+">+</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="equal" data-action="equals">=</button>
      </div>
    </main>

    <script>
      const display = document.getElementById('display');
      const keys = document.querySelector('.keys');

      function appendValue(value) {
        if (display.value === '0' || display.value === 'Erreur') {
          display.value = value;
        } else {
          display.value += value;
        }
      }

      function clearDisplay() {
        display.value = '0';
      }

      function calculate() {
        try {
          const expression = display.value;
          // On limite les caractères autorisés pour éviter une exécution arbitraire.
          if (!/^[0-9+\-*/().\s]+$/.test(expression)) {
            throw new Error('Expression non valide');
          }
          const result = Function(`"use strict"; return (${expression})`)();
          display.value = Number.isFinite(result) ? String(result) : 'Erreur';
        } catch {
          display.value = 'Erreur';
        }
      }

      keys.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) return;

        const action = target.dataset.action;
        const value = target.dataset.value;

        if (action === 'clear') {
          clearDisplay();
          return;
        }

        if (action === 'equals') {
          calculate();
          return;
        }

        if (value) {
          appendValue(value);
        }
      });
    </script>
  </body>
</html>
